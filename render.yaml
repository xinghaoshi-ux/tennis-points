services:
  - type: web
    name: tha-tennis-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: |
      pip install uv && uv sync --frozen --no-dev
    startCommand: |
      uv run alembic upgrade head && uv run python -m app.scripts.seed_full && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tha-tennis-db
          property: connectionString
      - key: REDIS_URL
        value: ""
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.9"

databases:
  - name: tha-tennis-db
    plan: free
    region: singapore
    databaseName: tha_tennis
    user: tha_user
